<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incident Report</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body { font-family: Arial; background:#111; color:#fff; padding:20px; }
.container { max-width:900px; margin:auto; }

input, textarea {
width:100%; padding:10px; margin-bottom:10px;
background:#000; color:#fff; border:1px solid #333;
}

button {
padding:12px; width:100%; margin-top:5px;
background:#fff; color:#000; font-weight:bold; cursor:pointer;
}

.preview img { width:80px; margin:5px; }

.page {
background:#fff; color:#000;
width:11in; min-height:8.5in;
padding:40px; margin:20px auto;
}

.photo-grid {
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.photo-grid img {
width:100%; height:300px; object-fit:cover;
}

.actions { margin-top:20px; display:flex; gap:10px; }
.actions button { flex:1; }

@media print {
body { background:#fff; }
button { display:none; }
}
</style>
</head>

<body>

<div class="container">

<h2>Incident Report Maker</h2>

<input id="name" placeholder="Reporting Officer">
<input id="location" placeholder="Location">

<textarea id="details" placeholder="Incident Details (Tagalog)"></textarea>
<textarea id="actions" placeholder="Response Taken (Tagalog)"></textarea>

<input type="file" id="images" multiple>

<div class="preview" id="preview"></div>

<button onclick="generate()">Generate Report</button>

<div id="output"></div>

</div>

<script>

let imgs = [];

// preview images
document.getElementById("images").addEventListener("change", async function(){
imgs = [];
const preview = document.getElementById("preview");
preview.innerHTML = "";

for (let file of this.files) {
const reader = new FileReader();
reader.onload = function(e){
imgs.push(e.target.result);
preview.innerHTML += `<img src="${e.target.result}">`;
}
reader.readAsDataURL(file);
}
});

// translate
async function translate(text){
const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=${encodeURIComponent(text)}`;
const res = await fetch(url);
const data = await res.json();
return data[0].map(x=>x[0]).join("");
}

// generate report
async function generate(){

const name = document.getElementById("name").value.toUpperCase();
const location = document.getElementById("location").value;
const details = await translate(document.getElementById("details").value);
const actions = await translate(document.getElementById("actions").value);

const time = new Date().toLocaleString();

let html = `
<div class="page">
<h2>Security Incident Report</h2>
<p><b>Date:</b> ${time}</p>
<p><b>Officer:</b> ${name}</p>
<p><b>Location:</b> ${location}</p>

<p><b>Incident:</b><br>${details}</p>
<p><b>Action:</b><br>${actions}</p>
</div>
`;

// photos (2 per page)
for(let i=0;i<imgs.length;i+=2){
html += `<div class="page"><div class="photo-grid">`;

html += `<img src="${imgs[i]}">`;

if(imgs[i+1]){
html += `<img src="${imgs[i+1]}">`;
}

html += `</div></div>`;
}

html += `
<div class="actions">
<button onclick="downloadPDF()">Download PDF</button>
<button onclick="downloadDOC()">Download Word</button>
<button onclick="window.print()">Print</button>
</div>
`;

document.getElementById("output").innerHTML = html;
}

// ✅ FIXED PDF DOWNLOAD (NO BLANK)
function downloadPDF(){

const element = document.getElementById("output").cloneNode(true);

// remove buttons
const btns = element.querySelector(".actions");
if(btns) btns.remove();

const temp = document.createElement("div");
temp.appendChild(element);
document.body.appendChild(temp);

html2pdf().set({
margin:0,
filename:'Incident_Report.pdf',
html2canvas:{scale:2, useCORS:true},
jsPDF:{unit:'in', format:'letter', orientation:'landscape'}
}).from(temp).save().then(()=>{
document.body.removeChild(temp);
});
}

// Word
function downloadDOC(){

const content = document.getElementById("output").innerHTML;

const blob = new Blob(['\ufeff', content], {type:'application/msword'});
const url = URL.createObjectURL(blob);

const a = document.createElement("a");
a.href = url;
a.download = "Incident_Report.doc";
a.click();
}

</script>

</body>
</html>

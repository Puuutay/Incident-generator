<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Security Incident Report</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    :root {
      --bg: #0b0b0b;
      --card: #141414;
      --border: #252525;
      --text: #ffffff;
      --muted: #a1a1a1;
      --input: #000000;
      --accent: #ffffff;
      --accentText: #000000;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .container { width: 100%; max-width: 1100px; }

    .header { text-align: center; margin-bottom: 24px; }

    .brand {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .header h1 {
      margin: 0;
      font-size: 1.35rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .header .sub {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 8px;
    }

    .form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
    }

    .field-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    input, textarea {
      width: 100%;
      background: var(--input);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      font: inherit;
      outline: none;
      resize: vertical;
    }

    input:focus, textarea:focus { border-color: #444; }

    input[type="file"] { padding: 12px; }

    .btn-gen, .btn-opt {
      border: none;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn-gen {
      width: 100%;
      padding: 15px 16px;
      border-radius: 10px;
      background: var(--accent);
      color: var(--accentText);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-gen:disabled { opacity: 0.7; cursor: not-allowed; }
    .btn-gen:hover:not(:disabled) { transform: translateY(-1px); }

    .preview-box {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .preview-item {
      border: 1px solid #333;
      border-radius: 10px;
      overflow: hidden;
      background: #0a0a0a;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .preview-empty {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 10px;
    }

    #reportWrapper {
      display: none;
      margin-top: 24px;
    }

    .paper-page {
      width: 11in;
      min-height: 8.5in;
      margin: 0 auto 18px;
      background: #fff;
      color: #000;
      border: 1px solid #d9d9d9;
      border-radius: 14px;
      padding: 0.45in;
      box-shadow: 0 10px 30px rgba(0,0,0,0.22);
    }

    .report-page {
      display: flex;
      flex-direction: column;
    }

    .report-header {
      text-align: center;
      margin-bottom: 18px;
    }

    .report-header .office {
      font-size: 0.78rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 8px;
    }

    .report-header h2 {
      margin: 0;
      font-size: 1.15rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .report-header .meta {
      margin-top: 8px;
      font-size: 0.9rem;
      color: #444;
    }

    .report-section { margin-bottom: 14px; }

    .report-label {
      font-weight: 700;
      font-size: 0.92rem;
      margin-bottom: 5px;
    }

    .report-text {
      font-size: 0.98rem;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .report-footer {
      margin-top: auto;
      padding-top: 14px;
      border-top: 1px solid #ddd;
      font-size: 0.95rem;
    }

    .signature-block { margin-top: 18px; }

    .signature-line {
      margin-top: 34px;
      width: 240px;
      border-top: 1px solid #222;
    }

    .signature-name {
      margin-top: 8px;
      font-weight: 700;
    }

    .photo-page {
      display: flex;
      flex-direction: column;
    }

    .photo-page-header {
      text-align: center;
      margin-bottom: 12px;
    }

    .photo-page-header h3 {
      margin: 0;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .photo-page-header .meta {
      margin-top: 6px;
      font-size: 0.86rem;
      color: #444;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      flex: 1;
      align-items: stretch;
    }

    .photo-grid.single { grid-template-columns: 1fr; }

    .photo-slot {
      border: 1px solid #222;
      border-radius: 12px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #fafafa;
      min-height: 5.8in;
    }

    .photo-slot img {
      max-width: 100%;
      max-height: 5.2in;
      object-fit: contain;
      display: block;
      border-radius: 8px;
    }

    .photo-caption {
      margin-top: 8px;
      font-size: 0.88rem;
      color: #444;
    }

    .report-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 22px;
    }

    .btn-opt {
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #333;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .btn-opt:hover { background: #232323; }

    .note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
    }

    @media (max-width: 1200px) {
      .paper-page { width: 100%; }
    }

    @media (max-width: 640px) {
      body { padding: 14px; }
      .form-card { padding: 16px; }
      .report-actions { grid-template-columns: 1fr; }
      .paper-page { padding: 18px; border-radius: 12px; }
      .photo-grid { grid-template-columns: 1fr; }
      .photo-slot { min-height: 280px; }
      .preview-box { grid-template-columns: repeat(2, 1fr); }
    }

    @media print {
      @page {
        size: letter landscape;
        margin: 0.35in;
      }

      body {
        background: #fff;
        padding: 0;
        display: block;
        color: #000;
      }

      .form-card,
      .report-actions,
      .header .sub,
      .note {
        display: none !important;
      }

      #reportWrapper {
        display: block !important;
        margin-top: 0;
      }

      .paper-page {
        width: 100%;
        min-height: 7.8in;
        margin: 0;
        border: none;
        border-radius: 0;
        box-shadow: none;
        page-break-after: always;
        break-after: page;
        padding: 0.35in;
      }

      .paper-page:last-child {
        page-break-after: auto;
        break-after: auto;
      }

      .photo-slot {
        background: #fff;
        min-height: 5.6in;
      }

      .photo-slot img { max-height: 4.9in; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand">Security Department</div>
      <h1>Incident Report Maker</h1>
      <div class="sub">Type in Tagalog, then generate a professional English report</div>
    </div>

    <div class="form-card">
      <div class="field-group">
        <label for="officerName">Reporting Officer</label>
        <input type="text" id="officerName" placeholder="Full Name" />
      </div>

      <div class="field-group">
        <label for="location">Location</label>
        <input type="text" id="location" placeholder="Location of incident" />
      </div>

      <div class="field-group">
        <label for="details">Incident Details (Tagalog)</label>
        <textarea id="details" rows="6" placeholder="I-kwento dito ang nangyari..."></textarea>
      </div>

      <div class="field-group">
        <label for="actions">Response Taken (Tagalog)</label>
        <textarea id="actions" rows="4" placeholder="Ano ang ginawa mo?"></textarea>
      </div>

      <div class="field-group">
        <label for="photoInput">Insert Picture(s)</label>
        <input type="file" id="photoInput" accept="image/*" multiple />
        <div id="previewEmpty" class="preview-empty">No image selected yet.</div>
        <div id="previewBox" class="preview-box"></div>
      </div>

      <button class="btn-gen" id="genBtn" onclick="generateReport()">
        Generate Professional English Report
      </button>
    </div>

    <div id="reportWrapper"></div>
  </div>

  <script>
    let uploadedImages = [];

    async function autoTranslate(text) {
      if (!text || !text.trim()) return "";
      const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=${encodeURIComponent(text)}`;
      try {
        const response = await fetch(url);
        const data = await response.json();
        if (!data || !data[0]) return text;
        return data[0].map(part => part[0]).join("").trim();
      } catch (error) {
        console.error("Translation error:", error);
        return text;
      }
    }

    function normalizeText(text) {
      return (text || "").replace(/\s+/g, " ").trim();
    }

    function readImageFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error("Failed to read image."));
        reader.readAsDataURL(file);
      });
    }

    function renderPreview() {
      const previewBox = document.getElementById("previewBox");
      const previewEmpty = document.getElementById("previewEmpty");
      previewBox.innerHTML = "";

      if (!uploadedImages.length) {
        previewEmpty.style.display = "block";
        return;
      }

      previewEmpty.style.display = "none";

      uploadedImages.forEach((src) => {
        const item = document.createElement("div");
        item.className = "preview-item";
        item.innerHTML = `<img src="${src}" alt="Selected image preview" />`;
        previewBox.appendChild(item);
      });
    }

    document.getElementById("photoInput").addEventListener("change", async function () {
      const files = Array.from(this.files || []);
      if (!files.length) {
        uploadedImages = [];
        renderPreview();
        return;
      }

      try {
        uploadedImages = await Promise.all(files.map(file => readImageFile(file)));
        renderPreview();
      } catch (error) {
        console.error(error);
        alert("Could not load one or more images.");
      }
    });

    function createReportPage({ timestamp, name, location, details, actions }) {
      const page = document.createElement("div");
      page.className = "paper-page report-page";

      page.innerHTML = `
        <div class="report-header">
          <div class="office">Security Department</div>
          <h2>Security Incident Report</h2>
          <div class="meta">Date and Time: ${timestamp}</div>
        </div>

        <div class="report-section">
          <div class="report-label">Reporting Officer</div>
          <div class="report-text">${name}</div>
        </div>

        <div class="report-section">
          <div class="report-label">Location</div>
          <div class="report-text">${location}</div>
        </div>

        <div class="report-section">
          <div class="report-label">Incident Summary</div>
          <div class="report-text">${details}</div>
        </div>

        <div class="report-section">
          <div class="report-label">Action Taken</div>
          <div class="report-text">${actions}</div>
        </div>

        <div class="report-section">
          <div class="report-label">Assessment</div>
          <div class="report-text">
            The incident was addressed promptly and in a controlled manner in accordance with standard security procedures. Based on the initial assessment, the situation did not present any immediate threat at the time of reporting.
          </div>
        </div>

        <div class="report-section">
          <div class="report-label">Status</div>
          <div class="report-text">
            The area has been secured and monitoring remains ongoing to help prevent any recurrence.
          </div>
        </div>

        <div class="report-footer">
          <div class="report-section" style="margin-bottom:0;">
            <div class="report-label">Documentation</div>
            <div class="report-text">
              This report is submitted for official record, review, and reference purposes. The information stated above is true and accurate to the best of the reporting officer's knowledge.
            </div>
          </div>

          <div class="signature-block">
            <div class="report-label">Reported By</div>
            <div class="signature-name">${name}</div>
            <div>Security Personnel</div>
            <div>Electronically Signed</div>
            <div class="signature-line"></div>
          </div>
        </div>
      `;
      return page;
    }

    function createPhotoPages(images) {
      const pages = [];

      for (let i = 0; i < images.length; i += 2) {
        const chunk = images.slice(i, i + 2);
        const page = document.createElement("div");
        page.className = "paper-page photo-page";

        const gridClass = chunk.length === 1 ? "photo-grid single" : "photo-grid";

        page.innerHTML = `
          <div class="photo-page-header">
            <h3>Attached Pictures</h3>
            <div class="meta">Page ${Math.floor(i / 2) + 1}</div>
          </div>
          <div class="${gridClass}" id="photoGrid_${i}"></div>
        `;

        const grid = page.querySelector(`#photoGrid_${i}`);

        chunk.forEach((src, index) => {
          const slot = document.createElement("div");
          slot.className = "photo-slot";
          slot.innerHTML = `
            <img src="${src}" alt="Attached photo ${i + index + 1}" />
            <div class="photo-caption">Photo ${i + index + 1}</div>
          `;
          grid.appendChild(slot);
        });

        pages.push(page);
      }

      return pages;
    }

    function buildAllPages() {
      const wrapper = document.getElementById("reportWrapper");
      wrapper.innerHTML = "";

      const timestamp = document.getElementById("reportMetaTime")?.innerText || "";
      const name = document.getElementById("reportMetaName")?.innerText || "";
      const location = document.getElementById("reportMetaLocation")?.innerText || "";
      const details = document.getElementById("reportMetaDetails")?.innerText || "";
      const actions = document.getElementById("reportMetaActions")?.innerText || "";

      const reportPage = createReportPage({
        timestamp,
        name,
        location,
        details,
        actions
      });

      wrapper.appendChild(reportPage);

      if (uploadedImages.length) {
        createPhotoPages(uploadedImages).forEach(page => wrapper.appendChild(page));
      }

      wrapper.style.display = "block";
    }

    async function generateReport() {
      const btn = document.getElementById("genBtn");
      const name = normalizeText(document.getElementById("officerName").value).toUpperCase();
      const location = normalizeText(document.getElementById("location").value);
      const rawDetails = document.getElementById("details").value;
      const rawActions = document.getElementById("actions").value;

      if (!name || !location || !rawDetails.trim() || !rawActions.trim()) {
        alert("Please fill in all fields.");
        return;
      }

      btn.innerText = "TRANSLATING...";
      btn.disabled = true;

      const englishDetails = normalizeText(await autoTranslate(rawDetails));
      const englishActions = normalizeText(await autoTranslate(rawActions));

      const timestamp = new Date().toLocaleString("en-US", {
        dateStyle: "long",
        timeStyle: "short"
      });

      const wrapper = document.getElementById("reportWrapper");
      wrapper.innerHTML = `
        <div id="reportMetaTime" style="display:none;">${timestamp}</div>
        <div id="reportMetaName" style="display:none;">${name}</div>
        <div id="reportMetaLocation" style="display:none;">${location}</div>
        <div id="reportMetaDetails" style="display:none;">${englishDetails}</div>
        <div id="reportMetaActions" style="display:none;">${englishActions}</div>
      `;

      const reportPage = createReportPage({
        timestamp,
        name,
        location,
        details: englishDetails,
        actions: englishActions
      });

      wrapper.appendChild(reportPage);

      if (uploadedImages.length) {
        createPhotoPages(uploadedImages).forEach(page => wrapper.appendChild(page));
      }

      const actionBar = document.createElement("div");
      actionBar.className = "report-actions";
      actionBar.innerHTML = `
        <button class="btn-opt" onclick="downloadPDF()">Download PDF</button>
        <button class="btn-opt" onclick="downloadDOC()">Download Word</button>
        <button class="btn-opt" onclick="window.print()">Print</button>
      `;
      wrapper.appendChild(actionBar);

      wrapper.style.display = "block";

      btn.innerText = "GENERATE PROFESSIONAL ENGLISH REPORT";
      btn.disabled = false;

      window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    }

    function downloadPDF() {
      const element = document.getElementById("reportWrapper");
      if (!element || !element.children.length) {
        alert("Generate the report first.");
        return;
      }

      const opt = {
        margin: 0,
        filename: "Incident_Report.pdf",
        image: { type: "jpeg", quality: 1 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: "in", format: "letter", orientation: "landscape" }
      };

      html2pdf().set(opt).from(element).save();
    }

    function downloadDOC() {
      const element = document.getElementById("reportWrapper");
      if (!element || !element.children.length) {
        alert("Generate the report first.");
        return;
      }

      const content = `
        <html>
        <head>
          <meta charset="UTF-8">
          <title>Incident Report</title>
          <style>
            body { font-family: Arial, sans-serif; padding: 20px; color: #000; }
            .paper-page { page-break-after: always; margin-bottom: 24px; }
            img { max-width: 100%; height: auto; }
          </style>
        </head>
        <body>
          ${element.innerHTML}
        </body>
        </html>
      `;

      const blob = new Blob(["\ufeff", content], { type: "application/msword" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "Incident_Report.doc";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function resetForm() {
      document.getElementById("officerName").value = "";
      document.getElementById("location").value = "";
      document.getElementById("details").value = "";
      document.getElementById("actions").value = "";
      document.getElementById("photoInput").value = "";
      document.getElementById("reportWrapper").style.display = "none";
      document.getElementById("reportWrapper").innerHTML = "";
      document.getElementById("previewBox").innerHTML = "";
      document.getElementById("previewEmpty").style.display = "block";
      uploadedImages = [];
    }
  </script>
</body>
</html>

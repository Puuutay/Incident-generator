<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incident Report</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body { font-family: Arial; background:#111; color:#fff; padding:20px; }
.container { max-width:900px; margin:auto; }

input, textarea {
width:100%; padding:10px; margin-bottom:10px;
background:#000; color:#fff; border:1px solid #333;
}

button {
padding:12px; width:100%; margin-top:5px;
background:#fff; color:#000; font-weight:bold; cursor:pointer;
}

/* REPORT PAGE */
.page {
background:#fff; color:#000;
width:8.5in;
min-height:13in;
padding:0.4in; /* maliit margin */
margin:20px auto;
font-size:13px;
line-height:1.4; /* tight spacing */
}

/* HEADER */
.header {
text-align:center;
margin-bottom:10px;
}

.header h2 {
margin:0;
font-size:16px;
}

.section {
margin-bottom:8px;
}

.label {
font-weight:bold;
}

/* PHOTO */
.photo-grid {
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.photo-grid img {
width:100%;
height:250px;
object-fit:cover;
}

/* BUTTONS */
.actions { margin-top:15px; display:flex; gap:10px; }
.actions button { flex:1; }

@media print {
@page { size: 8.5in 13in; margin:0.3in; }

body { background:#fff; }
button { display:none; }

.page {
margin:0;
box-shadow:none;
}
}
</style>
</head>

<body>

<div class="container">

<h2>Incident Report Maker</h2>

<input id="name" placeholder="Reporting Officer">
<input id="location" placeholder="Location">

<textarea id="details" placeholder="Incident Details (Tagalog)"></textarea>
<textarea id="actions" placeholder="Response Taken (Tagalog)"></textarea>

<input type="file" id="images" multiple>

<button onclick="generate()">Generate Report</button>

<div id="output"></div>

</div>

<script>

let imgs = [];

// image load
document.getElementById("images").addEventListener("change", function(){
imgs = [];
for (let file of this.files){
const reader = new FileReader();
reader.onload = e => imgs.push(e.target.result);
reader.readAsDataURL(file);
}
});

// translate
async function translate(text){
const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=${encodeURIComponent(text)}`);
const data = await res.json();
return data[0].map(x=>x[0]).join("");
}

// generate
async function generate(){

const name = document.getElementById("name").value.toUpperCase();
const location = document.getElementById("location").value;
const details = await translate(document.getElementById("details").value);
const actions = await translate(document.getElementById("actions").value);
const time = new Date().toLocaleString();

let html = `
<div class="page">

<div class="header">
<h2>SECURITY INCIDENT REPORT</h2>
</div>

<div class="section"><span class="label">Date and Time:</span> ${time}</div>
<div class="section"><span class="label">Reporting Officer:</span> ${name}</div>
<div class="section"><span class="label">Location:</span> ${location}</div>

<div class="section">
<span class="label">Incident Summary:</span><br>
${details}
</div>

<div class="section">
<span class="label">Action Taken:</span><br>
${actions}
</div>

<div class="section">
<span class="label">Assessment:</span><br>
The incident was handled in accordance with standard procedures. No immediate threat was observed at the time of reporting.
</div>

<div class="section">
<span class="label">Status:</span><br>
The situation is under control and continuously monitored.
</div>

<div class="section">
<span class="label">Documentation:</span><br>
This report is submitted as an official record. All information stated is true and correct.
</div>

<br><br>

<div>
_________________________<br>
${name}<br>
Security Personnel
</div>

</div>
`;

// photos
for(let i=0;i<imgs.length;i+=2){
html += `<div class="page"><div class="photo-grid">`;

html += `<img src="${imgs[i]}">`;

if(imgs[i+1]){
html += `<img src="${imgs[i+1]}">`;
}

html += `</div></div>`;
}

html += `
<div class="actions">
<button onclick="downloadPDF()">Download PDF</button>
<button onclick="downloadDOC()">Download Word</button>
<button onclick="window.print()">Print</button>
</div>
`;

document.getElementById("output").innerHTML = html;
}

// FIXED PDF
function downloadPDF(){
const element = document.getElementById("output").cloneNode(true);
const btn = element.querySelector(".actions");
if(btn) btn.remove();

const temp = document.createElement("div");
temp.appendChild(element);
document.body.appendChild(temp);

html2pdf().set({
margin:0,
filename:'Incident_Report.pdf',
html2canvas:{scale:2},
jsPDF:{unit:'in', format:[8.5,13], orientation:'portrait'}
}).from(temp).save().then(()=>{
document.body.removeChild(temp);
});
}

// WORD
function downloadDOC(){
const content = document.getElementById("output").innerHTML;
const blob = new Blob(['\ufeff', content], {type:'application/msword'});
const url = URL.createObjectURL(blob);
const a = document.createElement("a");
a.href = url;
a.download = "Incident_Report.doc";
a.click();
}

</script>

</body>
</html>
